# Cloudflare Workers — static assets only.
# Serves the site (index.html + assets/, css/, data/, js/) and nothing else.
# Files excluded from upload are listed in .assetsignore.
name = "airstream-archive"
compatibility_date = "2025-06-01"

[assets]
directory = "."
# Hash-based client routing means real requests always map to real files;
# serve index.html for anything unmatched so deep links still load the app.
not_found_handling = "single-page-application"
